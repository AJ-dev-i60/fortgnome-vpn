# Default connection values for FortGNOME VPN.
#
# All values are blank by default — enter them in the GUI Settings dialog.
# (Optional) An admin packaging this for a team may pre-fill the NON-secret
# shared values (server, remote_subnet) before building, so users only add
# their own username/password. Do NOT commit a real PSK to a public repo.
#
# Every field can be overridden per-user in Settings.
[vpn]
server =
psk =
remote_subnet =
username =
password =

# client_subnet (advanced/optional): the local traffic selector proposed to the
# gateway. Leave blank to use 0.0.0.0/0; set a specific CIDR only if your
# gateway's phase2 requires it.
client_subnet =
